<!DOCTYPE html>
<html>
<head>
    <title>Connexion Étudiant</title>
    <style>
        body {
            background: #f4f6f8;
            font-family: Arial;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        input, button {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            background: #0d6efd;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Connexion Étudiant</h2>

    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Nom d'utilisateur" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>
</div>

</body>
</html>
